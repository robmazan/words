<svg id="emoji" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
  <g id="color">
    <!-- Bushy tail (upright) -->
    <path fill="#C94B1A" stroke="none" d="M54,40 Q68,32 68,22 Q66,14 60,16 Q60,26 52,38 Z"/>
    <!-- Tail stripes -->
    <path fill="#f4c080" stroke="none" d="M60,16 Q62,20 60,26 Q58,24 58,18 Z"/>
    <path fill="#f4c080" stroke="none" d="M62,22 Q64,26 62,30 Q60,28 60,24 Z"/>
    <!-- Body (low-slung, elongated) -->
    <path fill="#C94B1A" stroke="none" d="M12,50 Q12,38 20,36 Q30,33 50,36 Q56,38 56,50 Q56,60 34,62 Q12,62 12,50 Z"/>
    <!-- White crossbands on back (numbat's key feature) -->
    <path fill="#FFFFFF" stroke="none" d="M26,34 Q28,33 30,34 L30,50 Q28,52 26,50 Z" opacity="0.85"/>
    <path fill="#FFFFFF" stroke="none" d="M34,33 Q36,33 38,34 L38,51 Q36,52 34,51 Z" opacity="0.85"/>
    <path fill="#FFFFFF" stroke="none" d="M42,34 Q44,35 46,36 L46,52 Q44,53 42,52 Z" opacity="0.85"/>
    <!-- Belly (lighter) -->
    <ellipse fill="#f4c080" stroke="none" cx="34" cy="52" rx="14" ry="9"/>
    <!-- Head (pointed snout) -->
    <path fill="#C94B1A" stroke="none" d="M6,38 Q8,28 18,30 Q26,32 28,40 Q26,48 18,48 Q8,48 6,38 Z"/>
    <!-- Dark stripe through eye (numbat facial marking) -->
    <path fill="#3a1a08" stroke="none" d="M6,34 Q10,32 18,34 Q18,38 10,38 Z"/>
    <!-- Lighter lower face -->
    <ellipse fill="#f4c080" stroke="none" cx="12" cy="42" rx="6" ry="4"/>
    <!-- Pointed snout tip -->
    <path fill="#C94B1A" stroke="none" d="M6,38 Q4,36 2,38 Q4,40 6,40 Z"/>
    <!-- Eye -->
    <circle fill="#ffffff" stroke="none" cx="16" cy="35" r="4"/>
    <circle fill="#1a1a1a" stroke="none" cx="15.5" cy="35" r="2.5"/>
    <circle fill="#ffffff" stroke="none" cx="16" cy="34" r="1"/>
    <!-- Nose (very pointed) -->
    <circle fill="#3a1a08" stroke="none" cx="2.5" cy="38" r="1.5"/>
    <!-- Small ear -->
    <ellipse fill="#C94B1A" stroke="none" cx="20" cy="26" rx="4" ry="5"/>
    <ellipse fill="#c47050" stroke="none" cx="20" cy="26" rx="2.5" ry="3.5"/>
    <!-- Legs -->
    <ellipse fill="#C94B1A" stroke="none" cx="22" cy="63" rx="5" ry="4"/>
    <ellipse fill="#C94B1A" stroke="none" cx="34" cy="65" rx="5" ry="4"/>
    <ellipse fill="#C94B1A" stroke="none" cx="46" cy="63" rx="5" ry="4"/>
  </g>
  <g id="hair"/>
  <g id="skin"/>
  <g id="skin-shadow"/>
  <g id="line">
    <path fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" d="M54,40 Q68,32 68,22 Q66,14 60,16 Q60,26 52,38 Z"/>
    <path fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" d="M12,50 Q12,38 20,36 Q30,33 50,36 Q56,38 56,50 Q56,60 34,62 Q12,62 12,50 Z"/>
    <path fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" d="M6,38 Q8,28 18,30 Q26,32 28,40 Q26,48 18,48 Q8,48 6,38 Z"/>
    <path fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" d="M6,38 Q4,36 2,38 Q4,40 6,40 Z"/>
    <circle fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" cx="16" cy="35" r="4"/>
    <ellipse fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" cx="20" cy="26" rx="4" ry="5"/>
    <!-- Crossband outlines (subtle) -->
    <path fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="1.5" d="M26,34 Q28,33 30,34 L30,50 Q28,52 26,50 Z"/>
    <path fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="1.5" d="M34,33 Q36,33 38,34 L38,51 Q36,52 34,51 Z"/>
    <path fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="1.5" d="M42,34 Q44,35 46,36 L46,52 Q44,53 42,52 Z"/>
    <ellipse fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" cx="22" cy="63" rx="5" ry="4"/>
    <ellipse fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" cx="34" cy="65" rx="5" ry="4"/>
    <ellipse fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" cx="46" cy="63" rx="5" ry="4"/>
  </g>
</svg>
