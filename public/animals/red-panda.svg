<svg id="emoji" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
  <g id="color">
    <!-- Body -->
    <ellipse fill="#C94B1A" stroke="none" cx="36" cy="54" rx="18" ry="13"/>
    <!-- Dark belly -->
    <ellipse fill="#3a1a08" stroke="none" cx="36" cy="56" rx="10" ry="9"/>
    <!-- Striped tail (right side) -->
    <path fill="#C94B1A" stroke="none" d="M52,52 Q66,46 68,36 Q66,32 62,34 Q62,42 50,50 Z"/>
    <path fill="#f4c080" stroke="none" d="M58,44 Q64,38 62,34 Q60,36 58,40 Z"/>
    <path fill="#f4c080" stroke="none" d="M62,48 Q68,42 68,36 Q66,36 64,40 Z"/>
    <!-- Head -->
    <circle fill="#C94B1A" stroke="none" cx="36" cy="30" r="18"/>
    <!-- White face base -->
    <ellipse fill="#f8e8d0" stroke="none" cx="36" cy="33" rx="12" ry="10"/>
    <!-- Dark eye patches -->
    <ellipse fill="#3a1a08" stroke="none" cx="26" cy="27" rx="7" ry="6"/>
    <ellipse fill="#3a1a08" stroke="none" cx="46" cy="27" rx="7" ry="6"/>
    <!-- White face sides -->
    <ellipse fill="#f8e8d0" stroke="none" cx="21" cy="31" rx="5" ry="4"/>
    <ellipse fill="#f8e8d0" stroke="none" cx="51" cy="31" rx="5" ry="4"/>
    <!-- Left ear -->
    <path fill="#C94B1A" stroke="none" d="M16,16 Q14,8 22,10 Q24,16 20,20 Z"/>
    <path fill="#f8e8d0" stroke="none" d="M17,15 Q16,10 21,12 Q22,16 19,19 Z"/>
    <!-- Right ear -->
    <path fill="#C94B1A" stroke="none" d="M56,16 Q58,8 50,10 Q48,16 52,20 Z"/>
    <path fill="#f8e8d0" stroke="none" d="M55,15 Q56,10 51,12 Q50,16 53,19 Z"/>
    <!-- Eyes -->
    <circle fill="#ffffff" stroke="none" cx="26" cy="27" r="4"/>
    <circle fill="#1a1a1a" stroke="none" cx="26.5" cy="27" r="2.5"/>
    <circle fill="#ffffff" stroke="none" cx="26" cy="26" r="1"/>
    <circle fill="#ffffff" stroke="none" cx="46" cy="27" r="4"/>
    <circle fill="#1a1a1a" stroke="none" cx="45.5" cy="27" r="2.5"/>
    <circle fill="#ffffff" stroke="none" cx="46" cy="26" r="1"/>
    <!-- Nose -->
    <ellipse fill="#3a1a08" stroke="none" cx="36" cy="37" rx="3" ry="2.5"/>
    <!-- Mouth -->
    <path fill="none" stroke="#3a1a08" stroke-linecap="round" stroke-width="1.5" d="M33,40 Q36,43 39,40"/>
  </g>
  <g id="hair"/>
  <g id="skin"/>
  <g id="skin-shadow"/>
  <g id="line">
    <ellipse fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" cx="36" cy="54" rx="18" ry="13"/>
    <path fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" d="M52,52 Q66,46 68,36 Q66,32 62,34 Q62,42 50,50 Z"/>
    <circle fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" cx="36" cy="30" r="18"/>
    <path fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" d="M16,16 Q14,8 22,10 Q24,16 20,20 Z"/>
    <path fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" d="M56,16 Q58,8 50,10 Q48,16 52,20 Z"/>
    <circle fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" cx="26" cy="27" r="4"/>
    <circle fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" cx="46" cy="27" r="4"/>
    <ellipse fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" cx="36" cy="37" rx="3" ry="2.5"/>
    <path fill="none" stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" d="M33,40 Q36,43 39,40"/>
  </g>
</svg>
